<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Clicker</title>
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #f9efce;
        font-family: "Bubblegum Sans";
        color: #333333;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }

      #gato {
        width: 300px;
        height: 300px;
        object-fit: cover;
        border-radius: 10px;
        cursor: pointer;
        border: 4px solid #f8c1bf;
        box-shadow: 3px 3px 6px #aaaaaa;
      }

      #btn-vender {
        background-color: #c2e0bc;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-family: "Bubblegum Sans";
        font-size: 1.2rem;
        box-shadow: 3px 3px 6px #aaaaaa;
      }

    #btn-loja {
    background-color: #f9efce;
    border: 4px solid #68c9d2;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-family: "Bubblegum Sans";
    font-size: 1.2rem;
    box-shadow: 3px 3px 6px #aaaaaa;
    flex: 1;
    max-width: 150px;
    }

    #modal-loja {
    display: none;
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    background-color: #c2e0bc;
    border: 3px solid #e2be5e;
    border-radius: 12px;
    padding: 20px;
    width: 250px;
    box-shadow: 4px 4px 10px #aaaaaa;
    }

    #modal-inventario {
    display: none;
    position: fixed;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    background-color: #f8c1bf;
    border: 3px solid #e2be5e;
    border-radius: 12px;
    padding: 20px;
    width: 250px;
    box-shadow: 4px 4px 10px #aaaaaa;
    }

    #btn-inventario {
      background-color: #f8c1bf;
      border: 4px solid #e2be5e;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-family: "Bubblegum Sans";
      font-size: 1.2rem;
      box-shadow: 3px 3px 6px #aaaaaa;
      flex: 1;
      max-width: 150px;
    }

    #btn-fechar-loja {
      background-color: #ffb3b3;
      border: 3px solid #e2be5e;
      margin-top: 20px;
      border-radius: 8px;
    }

    #btn-fechar-inventario {
      background-color: #c2e0bc;
      border: 3px solid #e2be5e;
      margin-top: 20px;
      border-radius: 8px;
    }

    #efeitos-ativos {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    }

    .efeito-card {
    background-color: #e2be5e;
    border: 2px solid #c2e0bc;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 0.9rem;
    box-shadow: 2px 2px 6px #aaaaaa;
    }

    #container-botoes {
        display: flex;
        gap: 15px;
        margin-top: 20px;
        justify-content: center;
        width: 100%;
    }

    


    * {
    touch-action: manipulation;
    }

    </style>
</head>
<body>
<h1>GatitoZito 🐱</h1>

<img src="https://cataas.com/cat" id="gato" alt="gatinho">

<p>💰 Moedas: <strong id="moedas">0</strong></p>
<p>🧶 Bolas de Pelo: <strong id="pelos">0</strong></p>

<button id="btn-vender">Vender Bolas de Pelo 🧶</button>

<div id="container-botoes">
    <button id="btn-loja">🛒 Loja</button>
    <button id="btn-inventario">🎒 Inventário</button>
</div>


<div id="modal-loja">
    <h2>🛒 Loja</h2>
    <p id="timer-loja">Próximo sorteio: 3:00</p>
    <div id="itens-loja"></div>
    <button id="btn-fechar-loja">Fechar</button>
</div>



<div id="modal-inventario">
    <h2>🎒 Inventário</h2>
    <div id="itens-inventario"></div>
    <button id="btn-fechar-inventario">Fechar</button>
</div>

<div id="efeitos-ativos"> </div>

<script>

// --- VARIÁVEIS GLOBAIS ---
const gato = document.querySelector("#gato");
const btnVender = document.querySelector("#btn-vender");
const displayMoedas = document.querySelector("#moedas");
const displayPelos = document.querySelector("#pelos");

let jogadorId = null;
let modalInventario = null;
let modalLoja = null;
let segundosLoja = 60;
let lojaAberta = false;
let inventarioAberto = false;
let bloqueado = false;
let processandoPulso = false; 

// --- FUNÇÕES DE APOIO ---

async function obterId() {
    let id = localStorage.getItem("jogador_id");
    if (id === null) {
        const resposta = await fetch("/novo_jogador", { method: "POST" });
        const dados = await resposta.json();
        id = dados.id;
        localStorage.setItem("jogador_id", id);
    }
    return id;
}

function atualizarTela(dados) {
    displayMoedas.textContent = dados.moedas;
    displayPelos.textContent = dados.pelos;
}

function tocarSom() {
    // Dica: Para otimizar, o ideal é criar o contexto fora, mas mantive aqui para não quebrar sua lógica
    const contexto = new (window.AudioContext || window.webkitAudioContext)();
    const oscilador = contexto.createOscillator();
    const volume = contexto.createGain();
    oscilador.connect(volume);
    volume.connect(contexto.destination);
    oscilador.frequency.value = 520;
    volume.gain.value = 0.1;
    oscilador.start();
    oscilador.stop(contexto.currentTime + 0.1);
}

// Atualiza os segundos dos cards visualmente (sem pedir nada ao servidor)
function atualizarContadoresVisuais() {
    const cards = document.querySelectorAll(".efeito-card");
    cards.forEach(card => {
        const expira = new Date(card.dataset.expira);
        const agora = new Date();
        const segundos = Math.floor((expira - agora) / 1000);
        
        if (segundos <= 0) {
            card.remove(); 
            // Opcional: recarregar inventário se o modal estiver aberto
            if (inventarioAberto) abrirInventario();
        } else {
            const minutos = Math.floor(segundos / 60);
            const segs = segundos % 60;
            const icone = card.dataset.icone;
            const nome = card.dataset.nome;
            card.textContent = `${icone} ${nome}  ${minutos}:${segs < 10 ? "0" : ""}${segs}`;
        }
    });
}

function atualizarEfeitos(itens) {
    const container = document.querySelector("#efeitos-ativos");
    container.innerHTML = "";
    
    itens.forEach(item => {
        if (!item.equipado) return;
        const icones = { "pelo_passivo": "🧶", "mais_pelos": "🌿", "mais_moedas": "🔴", "super_gato": "🐟" };
        const icone = icones[item.efeito] || "✨";
        
        const div = document.createElement("div");
        div.className = "efeito-card";
        div.dataset.expira = item.expira_em;
        div.dataset.icone = icone;
        div.dataset.nome = item.nome;
        container.appendChild(div);
    });
    atualizarContadoresVisuais();
}

// --- FUNÇÕES DE AÇÃO ---

async function abrirLoja() {
    const resposta = await fetch("/loja/" + jogadorId);
    const dados = await resposta.json();
    segundosLoja = dados.segundos_restantes;
    const container = document.querySelector("#itens-loja");
    container.innerHTML = "";

    dados.itens.forEach(item => {
        const div = document.createElement("div");
        div.style = "display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;";
        
        const span = document.createElement("span");
        span.innerHTML = `<strong>${item.nome}</strong> <small>(${item.raridade})</small> — ${item.preco}🪙 ${item.estoque > 0 ? "x" + item.estoque : ""}`;
        
        const btn = document.createElement("button");
        btn.innerText = (item.disponivel && item.estoque > 0) ? "Comprar" : "✗";
        btn.disabled = !(item.disponivel && item.estoque > 0);
        btn.style.marginLeft = "8px";

        btn.addEventListener("click", () => {
            btn.disabled = true;
            comprarItem(item.id);
        }, { once: true });

        div.appendChild(span);
        div.appendChild(btn);
        container.appendChild(div);
    });
    lojaAberta = true;
}

async function comprarItem(item_id) {
    if (bloqueado) return;
    bloqueado = true;
    try {
        const resposta = await fetch(`/comprar/${jogadorId}/${item_id}`, { method: "POST" });
        const dados = await resposta.json();
        if (dados.erro) alert(dados.erro);
        else {
            atualizarTela(dados);
            await abrirLoja();
            if (inventarioAberto) await abrirInventario();
            // Atualiza efeitos após compra/ativação
            const resInv = await fetch("/inventario/" + jogadorId);
            const itens = await resInv.json();
            atualizarEfeitos(itens);
        }
    } finally { bloqueado = false; }
}

async function abrirInventario() {
    const resposta = await fetch("/inventario/" + jogadorId);
    const itens = await resposta.json();
    inventarioAberto = true;
    const container = document.querySelector("#itens-inventario");
    container.innerHTML = itens.length === 0 ? "<p>Inventário vazio!</p>" : "";
    
    const agrupados = {};
    itens.forEach(item => {
        if (agrupados[item.nome]) {
            agrupados[item.nome].quantidade += 1;
            if (item.equipado) agrupados[item.nome].equipado = true;
        } else {
            agrupados[item.nome] = { ...item, quantidade: 1 };
        }
    });

    Object.values(agrupados).forEach(item => {
        const div = document.createElement("div");
        div.style = "display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;";
        div.innerHTML = `
            <span><strong>${item.nome}</strong> x${item.quantidade} — ${item.equipado ? "✅" : "💤"}</span>
            <button ${item.equipado ? "disabled" : ""} onclick="ativarItem(${item.inventario_id})" style="margin-left:8px;">
                ${item.equipado ? "Ativo" : "Ativar"}
            </button>
        `;
        container.appendChild(div);
    });
}

async function ativarItem(inventario_id) {
    const resposta = await fetch(`/ativar/${jogadorId}/${inventario_id}`, { method: "POST" });
    const dados = await resposta.json();
    if (dados.erro) alert(dados.erro);
    else {
        atualizarTela(dados);
        await abrirInventario();
        const resInv = await fetch("/inventario/" + jogadorId);
        const itens = await resInv.json();
        atualizarEfeitos(itens);
    }
}

// --- O CORAÇÃO DO JOGO (HEARTBEAT) ---

async function iniciar() {
    const id = await obterId();
    jogadorId = id;

    // Configuração de Modais
    modalLoja = document.querySelector("#modal-loja");
    modalInventario = document.querySelector("#modal-inventario");

    // Eventos de Botões Principais
    document.querySelector("#btn-loja").addEventListener("click", () => {
        modalLoja.style.display = lojaAberta ? "none" : "block";
        if (!lojaAberta) abrirLoja();
        else lojaAberta = false;
    });

    document.querySelector("#btn-fechar-loja").addEventListener("click", () => {
        modalLoja.style.display = "none";
        lojaAberta = false;
    });

    document.querySelector("#btn-inventario").addEventListener("click", () => {
        modalInventario.style.display = inventarioAberto ? "none" : "block";
        if (!inventarioAberto) abrirInventario();
        else inventarioAberto = false;
    });

    document.querySelector("#btn-fechar-inventario").addEventListener("click", () => {
        modalInventario.style.display = "none";
        inventarioAberto = false;
    });

    // Cliques do Jogo
    gato.addEventListener("click", async () => {
        if (bloqueado) return;
        tocarSom();
        const res = await fetch("/clicar/" + id, { method: "POST" });
        atualizarTela(await res.json());
    });

    btnVender.addEventListener("click", async () => {
        const res = await fetch("/vender/" + id, { method: "POST" });
        atualizarTela(await res.json());
    });

    // Carga Inicial
    const resEst = await fetch("/estado/" + id);
    atualizarTela(await resEst.json());
    const resInv = await fetch("/inventario/" + id);
    atualizarEfeitos(await resInv.json());

    // --- INÍCIO DO PULSO ÚNICO ---
    setInterval(async () => {
    if (processandoPulso || !jogadorId) return;
    processandoPulso = true;

    try {
        // 1. Ganho Passivo
        const resPassivo = await fetch("/passivo/" + jogadorId, { method: "POST" });
        const dadosPassivo = await resPassivo.json();
        if (dadosPassivo.erro) {
            localStorage.clear();
            location.reload();
            return;
        }
        atualizarTela(dadosPassivo);

        // 2. Timer da Loja
        segundosLoja -= 1;
        const timerDisplay = document.querySelector("#timer-loja");
        if (timerDisplay) {
            const min = Math.floor(segundosLoja / 60);
            const seg = segundosLoja % 60;
            timerDisplay.textContent = `Próximo sorteio: ${min}:${seg < 10 ? "0" : ""}${seg}`;
        }

        if (segundosLoja <= 0) {
            await abrirLoja();
        }

        // 3. Contadores Visuais
        atualizarContadoresVisuais();

    } catch (e) {
        console.error("Pulso falhou:", e);
    } finally {
        processandoPulso = false;
    }
}, 1000);
}

iniciar();
  
</script>


</body>
</html>
